---
layout: default
active: project
page_css: tools
---

<div class="csv-viewer-header">
  <div class="csv-viewer-header-left">
    <a href="/html/project.html" class="csv-back-link">&larr; Projects</a>
    <h1 class="csv-viewer-title">JSON Formatter</h1>
  </div>
  <div class="csv-viewer-header-right">
    <span class="tool-toggle-label">Indent</span>
    <div class="csv-toggle">
      <button class="csv-toggle-btn active" id="btn-2">2</button>
      <button class="csv-toggle-btn" id="btn-4">4</button>
    </div>
    <div class="csv-toggle">
      <button class="csv-toggle-btn active" id="btn-edit">Edit</button>
      <button class="csv-toggle-btn" id="btn-format">Format</button>
    </div>
  </div>
</div>

<div class="csv-tool-layout">
  <div class="csv-input-panel" id="json-input-panel">
    <button class="panel-action-btn" id="paste-btn">Paste</button>
    <textarea
      id="json-input"
      class="csv-textarea"
      placeholder='{"name": "Alice", "age": 30, "active": true}'
      spellcheck="false"
    ></textarea>
  </div>
  <div class="csv-output-panel csv-hidden" id="json-output">
    <button class="panel-action-btn" id="copy-btn">Copy</button>
    <div class="panel-content" id="json-output-content">
      <div class="csv-empty-state">Switch to Edit, paste your JSON, then click Format.</div>
    </div>
  </div>
</div>

<script>
  const outputEl   = document.getElementById('json-output');
  const contentEl  = document.getElementById('json-output-content');
  const inputPanel = document.getElementById('json-input-panel');
  const btnEdit    = document.getElementById('btn-edit');
  const btnFormat  = document.getElementById('btn-format');
  const btn2       = document.getElementById('btn-2');
  const btn4       = document.getElementById('btn-4');
  let indent = 2;

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function format() {
    const text = document.getElementById('json-input').value.trim();
    if (!text) {
      contentEl.innerHTML = '<div class="csv-empty-state">Switch to Edit, paste your JSON, then click Format.</div>';
      return;
    }
    try {
      const pre = document.createElement('pre');
      pre.className = 'json-output';
      pre.textContent = JSON.stringify(JSON.parse(text), null, indent);
      contentEl.innerHTML = '';
      contentEl.appendChild(pre);
    } catch (e) {
      contentEl.innerHTML = '<div class="json-error">' + escapeHtml(e.message) + '</div>';
    }
  }

  function switchView(view) {
    inputPanel.classList.toggle('csv-hidden', view !== 'edit');
    outputEl.classList.toggle('csv-hidden', view !== 'format');
    btnEdit.classList.toggle('active', view === 'edit');
    btnFormat.classList.toggle('active', view === 'format');
  }

  function setIndent(n) {
    indent = n;
    btn2.classList.toggle('active', n === 2);
    btn4.classList.toggle('active', n === 4);
    if (!outputEl.classList.contains('csv-hidden')) format();
  }

  btnEdit.addEventListener('click', () => switchView('edit'));
  btnFormat.addEventListener('click', () => { format(); switchView('format'); });
  btn2.addEventListener('click', () => setIndent(2));
  btn4.addEventListener('click', () => setIndent(4));

  document.getElementById('paste-btn').addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      const ta = document.getElementById('json-input');
      ta.value = text;
      ta.dispatchEvent(new Event('input'));
    } catch (_) {}
  });

  document.getElementById('copy-btn').addEventListener('click', async () => {
    const text = contentEl.innerText.trim();
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    } catch (_) {}
  });
</script>
