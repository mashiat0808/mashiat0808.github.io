---
layout: default
active: blog
page_css: blog
---

<article class="post-article">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
  {% if page.tags and page.tags.size > 0 %}
  <div class="post-tags">
    {% for tag in page.tags %}
    <a href="/html/blog.html#tag:{{ tag }}" class="blog-tag">{{ tag }}</a>
    {% endfor %}
  </div>
  {% endif %}

  <div class="post-layout">
    <div class="post-body">{{ content }}</div>

    <nav class="post-toc" id="post-toc">
      <p class="toc-label">Table of Contents</p>
      <ul class="toc-list" id="toc-list"></ul>
    </nav>
  </div>
</article>

<script>
  (function () {
    const body = document.querySelector(".post-body");
    const toc = document.getElementById("post-toc");
    const list = document.getElementById("toc-list");
    const headings = body.querySelectorAll("h1, h2, h3");

    if (!headings.length) {
      toc.style.display = "none";
      return;
    }

    headings.forEach((h) => {
      if (!h.id) h.id = h.textContent.trim().toLowerCase().replace(/\s+/g, "-").replace(/[^\w-]/g, "");
      const li = document.createElement("li");
      li.className = h.tagName === "H3" ? "toc-h3" : h.tagName === "H2" ? "toc-h2" : "";
      const a = document.createElement("a");
      a.href = "#" + h.id;
      a.textContent = h.textContent;
      a.dataset.id = h.id;
      li.appendChild(a);
      list.appendChild(li);
    });

    const links = list.querySelectorAll("a");

    function setActive(id) {
      links.forEach((a) => a.classList.remove("toc-active"));
      if (id) {
        const a = list.querySelector(`a[data-id="${id}"]`);
        if (a) a.classList.add("toc-active");
      }
    }

    setActive(window.location.hash.slice(1));
    window.addEventListener("hashchange", () => setActive(window.location.hash.slice(1)));
  })();
</script>

<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: document.documentElement.style.colorScheme === 'dark' ? 'dark' : 'default',
    {% if page.mermaid_rank_spacing or page.mermaid_padding %}
    flowchart: {
      {% if page.mermaid_rank_spacing %}rankSpacing: {{ page.mermaid_rank_spacing }},{% endif %}
      {% if page.mermaid_padding %}padding: {{ page.mermaid_padding }},{% endif %}
    },
    {% endif %}
  });
  const mermaidNodes = [];
  document.querySelectorAll('.post-body pre > code[class*="language-mermaid"]').forEach(function (codeEl) {
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = codeEl.textContent;
    codeEl.closest('pre').replaceWith(div);
    mermaidNodes.push(div);
  });
  if (mermaidNodes.length) mermaid.run({ nodes: mermaidNodes });
</script>

{% if page.math %}
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$']],
      displayMath: [['$$', '$$']],
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
    }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
{% endif %}
